<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 15px; 
            background: linear-gradient(rgba(26, 26, 27, 0.85), rgba(26, 26, 27, 0.85)), 
                        url('https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Russian_ruble_5000_front_banknote_2023.jpg/800px-Russian_ruble_5000_front_banknote_2023.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0; 
            min-height: 100vh;
        }
        .card { 
            background: rgba(36, 36, 37, 0.9); 
            padding: 20px; border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        .greeting { font-size: 1.1em; font-weight: bold; color: #a29bfe; margin-bottom: 5px; }
        .status-line { font-size: 0.8em; color: #bbb; margin-bottom: 20px; }
        .section { color: #55efc4; font-size: 0.75em; font-weight: bold; margin: 15px 0 10px; letter-spacing: 1px; text-transform: uppercase; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        input { 
            width: 90px; background: rgba(45, 45, 46, 0.8); border: 1px solid #444; 
            color: white; border-radius: 8px; padding: 8px; text-align: right; outline: none; 
        }
        .ai-box { 
            background: rgba(162, 155, 254, 0.1); border-left: 4px solid #a29bfe; 
            padding: 12px; border-radius: 8px; margin: 20px 0; font-size: 0.85em; 
        }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95em; }
        button { 
            width: 100%; background: #a29bfe; color: #1a1a1b; border: none; 
            padding: 16px; border-radius: 14px; font-weight: bold; margin-top: 10px; 
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="user-greeting" class="greeting">Привет!</div>
        <div id="ai-status" class="status-line">Загружаю данные...</div>
        
        <div class="section">💰 МОИ АКТИВЫ</div>
        <div class="row"><span>💵 Наличные</span><input type="number" id="cash" value="5000"></div>
        <div class="row"><span>💳 Сбербанк</span><input type="number" id="sber" value="15000"></div>
        <div class="row"><span>🟡 Тинькофф</span><input type="number" id="tink" value="5000"></div>
        <div class="row"><span>🔵 ВТБ</span><input type="number" id="vtb" value="0"></div>

        <div class="section">📊 ПЛАН</div>
        <div class="row"><span>📈 Доход</span><input type="number" id="inc" value="50000"></div>
        <div class="row"><span>📉 Траты</span><input type="number" id="exp" value="20000"></div>

        <div class="ai-box">
            <span id="advice">Анализирую твой бюджет...</span>
        </div>

        <div class="res-row"><span>Всего сейчас:</span><b id="total" style="color:#55efc4">0 ₽</b></div>
        <div class="res-row"><span>Прогноз:</span><b id="proj" style="color:#74b9ff">0 ₽</b></div>

        <button onclick="save()">💾 ЗАФИКСИРОВАТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function update() {
            const v = (id) => parseFloat(document.getElementById(id).value) || 0;
            const total = v('cash') + v('sber') + v('tink') + v('vtb');
            const net = v('inc') - v('exp');
            const proj = total + net;

            document.getElementById('total').innerText = total.toLocaleString() + " ₽";
            document.getElementById('proj').innerText = proj.toLocaleString() + " ₽";

            // Логика приветствия
            const hour = new Date().getHours();
            let welcome = "Доброй ночи";
            if (hour >= 5 && hour < 12) welcome = "Доброе утро";
            else if (hour >= 12 && hour < 18) welcome = "Добрый день";
            else if (hour >= 18 && hour < 23) welcome = "Добрый вечер";

            const name = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Друг";
            document.getElementById('user-greeting').innerText = `${welcome}, ${name}!`;

            // Статус в зависимости от бюджета
            let status = "";
            if (total > 100000) status = "💰 Ты сегодня при деньгах!";
            else if (total > 10000) status = "👍 Стабильное положение.";
            else status = "⬇️ Нужно поднажать в этом месяце.";
            document.getElementById('ai-status').innerText = status;

            // Совет ИИ
            let adv = net > 0 ? `Прогноз отличный: +${net.toLocaleString()} ₽.` : `Осторожно, минус ${Math.abs(net).toLocaleString()} ₽!`;
            document.getElementById('advice').innerHTML = `🤖 <b>ИИ:</b> ${adv}`;
        }

        document.querySelectorAll('input').forEach(i => i.oninput = update);
        update();

        function save() {
            tg.HapticFeedback.notificationOccurred('success');
            tg.showPopup({ title: "Готово", message: "Бюджет обновлен!", buttons: [{type: "ok"}] });
        }
    </script>
</body>
</html>
