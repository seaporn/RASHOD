<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1b; color: #e0e0e0; margin: 0; padding: 20px; }
        .card { background: #242425; padding: 20px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .header { color: #a29bfe; font-weight: bold; font-size: 1.2em; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .section { color: #55efc4; font-size: 0.8em; font-weight: bold; margin: 15px 0 10px; letter-spacing: 1px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        input { width: 100px; background: #2d2d2e; border: 1px solid #444; color: white; border-radius: 8px; padding: 8px; text-align: right; outline: none; }
        .ai-box { background: rgba(162,155,254,0.1); border-left: 4px solid #a29bfe; padding: 12px; border-radius: 8px; margin: 20px 0; font-size: 0.85em; line-height: 1.4; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; }
        .res-val { font-weight: bold; color: #55efc4; }
        button { width: 100%; background: #a29bfe; color: #1a1a1b; border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">💎 Бюджет Bot <span>AI v2.0</span></div>
        
        <div class="section">💰 КОШЕЛЕК</div>
        <div class="row"><span>💳 Сбербанк</span><input type="number" id="sber" value="15000"></div>
        <div class="row"><span>🟡 Тинькофф</span><input type="number" id="tink" value="5000"></div>
        <div class="row"><span>🔵 ВТБ</span><input type="number" id="vtb" value="0"></div>

        <div class="section">📊 ПЛАН</div>
        <div class="row"><span>📈 Доход</span><input type="number" id="inc" value="45000"></div>
        <div class="row"><span>📉 Траты</span><input type="number" id="exp" value="15000"></div>

        <div class="ai-box">
            <b style="color: #a29bfe;">🤖 СОВЕТ ИИ:</b><br>
            <span id="advice">Анализирую...</span>
        </div>

        <div class="res-row"><span>Всего сейчас:</span><span class="res-val" id="total">0 ₽</span></div>
        <div class="res-row"><span>Прогноз:</span><span class="res-val" id="proj" style="color:#74b9ff">0 ₽</span></div>

        <button onclick="save()">💾 СОХРАНИТЬ В ОБЛАКО</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function update() {
            const v = (id) => parseFloat(document.getElementById(id).value) || 0;
            const total = v('sber') + v('tink') + v('vtb');
            const net = v('inc') - v('exp');
            const proj = total + net;

            document.getElementById('total').innerText = total.toLocaleString() + " ₽";
            document.getElementById('proj').innerText = proj.toLocaleString() + " ₽";

            let adv = net > 0 ? `Капитал растет! +${net} ₽ за месяц.` : `Внимание! Дефицит ${Math.abs(net)} ₽.`;
            document.getElementById('advice').innerText = adv;
        }

        document.querySelectorAll('input').forEach(i => i.oninput = update);
        update();

        function save() {
            tg.showPopup({ message: "Данные успешно синхронизированы!" });
        }
    </script>
</body>
</html>
