<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 15px; 
            /* МЕНЯЕМ ЗДЕСЬ: сделали градиент светлее (0.7 вместо 0.9) */
            background: linear-gradient(rgba(26, 26, 27, 0.75), rgba(26, 26, 27, 0.85)), 
                        url('https://i.ibb.co/bRDFHNp4/Banknote-5000-rubles-1997-front.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff; 
            min-height: 100vh;
        }
        
        /* НЕМНОГО ПОДПРАВИМ КАРТОЧКУ, ЧТОБЫ ОНА БЫЛА КОНТРАСТНЕЕ */
        .card { 
            background: rgba(28, 28, 30, 0.7); /* Сделали чуть прозрачнее саму карточку */
            padding: 20px; border-radius: 28px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        .greeting { font-size: 1.2em; font-weight: bold; color: #a29bfe; }
        .section { color: #55efc4; font-size: 0.75em; font-weight: bold; margin: 15px 0 10px; text-transform: uppercase; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        input { 
            width: 100px; background: rgba(255, 255, 255, 0.05); border: 1px solid #444; 
            color: white; border-radius: 10px; padding: 10px; text-align: right; font-size: 1em; outline: none;
        }
        .ai-box { background: rgba(162, 155, 254, 0.1); border-left: 4px solid #a29bfe; padding: 12px; border-radius: 8px; margin: 20px 0; font-size: 0.85em; }
        button { width: 100%; background: #a29bfe; color: #1a1a1b; border: none; padding: 18px; border-radius: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* Стиль для версии */
        .version-tag { font-size: 0.6em; color: #555; text-align: center; margin-top: 15px; letter-spacing: 1px; }
    </style>
</head>
<body onclick="document.activeElement.blur()"> <div class="card" onclick="event.stopPropagation()">
        <div id="user-greeting" class="greeting">Привет!</div>
        <div id="ai-status" style="font-size: 0.8em; color: #bbb; margin-bottom: 15px;">Загрузка...</div>
        
        <div class="section">🏙️ АКТИВЫ</div>
        <div class="row"><span>💵 Наличные</span><input type="number" id="cash" value="5000"></div>
        <div class="row"><span>💳 Сбербанк</span><input type="number" id="sber" value="15000"></div>
        <div class="row"><span>🟡 Тинькофф</span><input type="number" id="tink" value="10000"></div>
        <div class="row"><span>🔵 ВТБ</span><input type="number" id="vtb" value="0"></div>

        <div class="section">📊 ПЛАН</div>
        <div class="row"><span>📈 Доход</span><input type="number" id="inc" value="60000"></div>
        <div class="row"><span>📉 Траты</span><input type="number" id="exp" value="30000"></div>

        <div class="ai-box"><span id="advice">...</span></div>

        <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Итог:</span><b id="total" style="color:#55efc4">0 ₽</b></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>Прогноз:</span><b id="proj" style="color:#74b9ff">0 ₽</b></div>

        <button onclick="save()">💾 ЗАФИКСИРОВАТЬ</button>
        
        <div class="version-tag">ВЕРСИЯ ДЛЯ ЛЮБИМОЙ НАСТЮШИ VER: 1.0</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function update() {
            const v = (id) => parseFloat(document.getElementById(id).value) || 0;
            const total = v('cash') + v('sber') + v('tink') + v('vtb');
            const net = v('inc') - v('exp');
            const proj = total + net;

            document.getElementById('total').innerText = total.toLocaleString() + " ₽";
            document.getElementById('proj').innerText = proj.toLocaleString() + " ₽";

            // Приветствие по времени
            const hr = new Date().getHours();
            let greet = (hr<6)?"Ночи":(hr<12)?"Утро":(hr<18)?"День":"Вечер";
            const name = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Друг";
            document.getElementById('user-greeting').innerText = `Добрый ${greet}, ${name}!`;
            document.getElementById('ai-status').innerText = total > 50000 ? "💰 Капитал в порядке" : "📉 Нужно поднажать";
            
            let adv = net > 0 ? `Растем на ${net} ₽!` : `Убыток ${Math.abs(net)} ₽!`;
            document.getElementById('advice').innerHTML = `🤖 <b>ИИ:</b> ${adv}`;
        }

        document.querySelectorAll('input').forEach(i => i.oninput = update);
        update();

        function save() {
            document.activeElement.blur(); // Скрыть клавиатуру при сохранении
            tg.HapticFeedback.notificationOccurred('success');
            tg.showPopup({ title: "ОК", message: "Данные зафиксированы!", buttons: [{type: "ok"}] });
        }
    </script>
</body>
</html>
